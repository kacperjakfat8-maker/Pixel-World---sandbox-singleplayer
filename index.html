    breaking.maxProgress=BLOCKS[block]?.hits||2;
    if(isBreakingHeld&&now-breaking.lastHitTime>=200){
        breaking.progress++;
        breaking.lastHitTime=now;
    }
    if(breaking.progress<breaking.maxProgress)return;
    if(Math.random()<(block===20?0:block===13?1:0.4))spawnDrop(x,y,"gem");
    updateGemsUI();
    const DROP_MAP={
        1:{block:"soil",seed:"soil_seed",nothing:40,blockChance:35},
        2:{block:"granite",seed:"granite_seed",nothing:45,blockChance:39},
        3:{block:"cave_bg",seed:"cave_bg_seed",nothing:40,blockChance:35},
        4:{block:"grass",seed:"grass_seed",nothing:40,blockChance:35},
        5:{block:"lava",seed:"lava_seed",nothing:35,blockChance:35},
        6:{block:"wood",seed:"wood_seed",nothing:40,blockChance:35},
        7:{block:"obsidian",seed:"obsidian_seed",nothing:40,blockChance:40},
        9:{block:"marble",seed:"marble_seed",nothing:40,blockChance:35},
        10:{block:"sand",seed:"sand_seed",nothing:40,blockChance:35},
        11:{block:"sandstone",seed:"sandstone_seed",nothing:45,blockChance:40},
        12:{block:"water",seed:"water_seed",nothing:40,blockChance:40},
        13:{block:"gem_soil",seed:"gem_soil_seed",nothing:40,blockChance:40},
        14:{block:"black_brick",seed:"black_brick_seed",nothing:40,blockChance:40},
        15:{block:"concrete_block_1x1",seed:"concrete_block_1x1_seed",nothing:40,blockChance:40},
        16:{block:"glass",seed:"glass_seed",nothing:40,blockChance:40},
        17:{block:"magic_stuff",seed:"magic_stuff_seed",nothing:40,blockChance:40},
        18:{block:"metal_plate",seed:"metal_plate_seed",nothing:40,blockChance:40},
        19:{block:"red_brick",seed:"red_brick_seed",nothing:40,blockChance:40},
        20:{block:"world_lock",seed:null,nothing:0,blockChance:100}
    };
    const cfg=DROP_MAP[block];
    let dropBlock=null,dropSeed=null;
    if(cfg){
        const r=Math.random()*100,mid=cfg.nothing+cfg.blockChance;
        if(r>=cfg.nothing)r<mid?dropBlock=cfg.block:dropSeed=cfg.seed;
    }
    if(block===20){
        inventory.world_lock++;
        updateInventoryUI();
        updateHotbar();
        const displayName=playerName?.trim()?playerName:"Unnamed";
        addChatMessage(`<${displayName}> unlocked world`);
        worldOwner=null;
        worldLockPos=null;
    }else{
        if(dropBlock)spawnDrop(x,y,dropBlock);
        if(dropSeed)spawnDrop(x,y,dropSeed);
    }
    isBackground?background[y][x]=0:world[y][x]=0;
    breaking=null;
    updateInventoryUI();
    updateHotbar();
}
function placeBlock(mouseX,mouseY){
const r=canvas.getBoundingClientRect(),
worldX=Math.floor((mouseX-r.left)/zoom/blockSize+camera.x/blockSize),
worldY=Math.floor((mouseY-r.top)/zoom/blockSize+camera.y/blockSize),
px=Math.floor(player.x/blockSize),
py=Math.floor(player.y/blockSize),
dx=worldX-px,
dy=worldY-py;
if(dx*dx+dy*dy>9)return;
if(!hotbar.block||!inventory[hotbar.block]){hotbar.block=null;hotbar.selected=0;updateHotbar();return;}
const item=hotbar.block,
name=playerName?.trim()||"Unnamed",
isSeed=item.includes("_seed"),
isBg=item==="cave_bg",
tree=trees.find(t=>t.x===worldX&&t.y===worldY),
cell=world[worldY]?.[worldX]??0,
bg=background[worldY]?.[worldX]??0;
if(
worldOwner &&
name!==worldOwner &&
item!=="world_lock"
){
addChatMessage("[WORLD] This world belongs to another player!");
return;
}
if(isSeed){
if(tree){
const result=getSeedResult(tree.type,item);
if(!result)return;
trees=trees.filter(t=>t!==tree);
trees.push({
x:worldX,
y:worldY,
type:result,
stage:0,
plantedAt:Date.now(),
growTime:["concrete_block_1x1_seed","glass_seed","magic_stuff_seed","metal_plate_seed","red_brick_seed"].includes(item)?60000:30000
});
}else{
if(cell)return;
const below=world[worldY+1]?.[worldX];
if(!below||!BLOCKS[below]?.solid)return;
trees.push({
x:worldX,
y:worldY,
type:item,
stage:0,
plantedAt:Date.now(),
growTime:30000
});
}
inventory[item]--;
if(inventory[item]<=0){
inventory[item]=0;
hotbar.block=null;
hotbar.selected=0;
}
updateInventoryUI();
updateHotbar();
return;
}
if(isBg){
if(!background[worldY])background[worldY]=[];
if(bg)return;
background[worldY][worldX]=3;
inventory[item]--;
if(inventory[item]<=0){
inventory[item]=0;
hotbar.block=null;
hotbar.selected=0;
}
updateInventoryUI();
updateHotbar();
return;
}
if(tree||cell)return;
const bl=worldX*blockSize,
br=bl+blockSize,
bt=worldY*blockSize,
bb=bt+blockSize,
pl=player.x,
pr=player.x+player.width,
pt=player.y,
pb=player.y+player.height;
if(pr>bl&&pl<br&&pb>bt&&pt<bb)return;
if(!world[worldY])world[worldY]=[];
const PLACE_MAP={soil:1,granite:2,grass:4,lava:5,wood:6,obsidian:7,marble:9,sand:10,sandstone:11,water:12,gem_soil:13,black_brick:14,concrete_block_1x1:15,glass:16,magic_stuff:17,metal_plate:18,red_brick:19,world_lock:20};
const id=PLACE_MAP[item];
if(id===undefined)return;
if(id===20){
if(worldOwner){
addChatMessage("[WORLD] This world is already locked!");
return;
}
if(name==="Unnamed"){
addChatMessage("[WORLD] Set your player name first!");
return;
}
}
world[worldY][worldX]=id;
if(id===20){worldOwner=name;worldLockPos={x:worldX,y:worldY};addChatMessage(`<${name}> locked this world`);}
inventory[item]--;
if(inventory[item]<=0){inventory[item]=0;hotbar.block=null;hotbar.selected=0;}
updateInventoryUI();
updateHotbar();}
requestAnimationFrame(loop);
</script>    
</body>
