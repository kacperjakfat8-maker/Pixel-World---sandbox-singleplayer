<meta charset="UTF-8">

<style>    
/* GLOBAL */
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    touch-action: none;
}
canvas {
    display: block;
    image-rendering: pixelated;
}
* { box-sizing: border-box; }
/* UI CONTAINER */
#uiContainer {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    transform: translateY(0);
    transition: transform 0.25s;
}
/* HOTBAR */
#hotbar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 5px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
}
.slot {
    width: 60px;
    height: 60px;
    border: 3px solid white;
    line-height: 1;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    user-select: none;
}
.slot.selected {
    border-color: yellow;
}
.count {
    position: absolute;
    bottom: 2px;
    right: 4px;
    color: white;
    font-size: 16px;
    font-weight: bold;
}
/* INVENTORY / EQ */
#inventoryUI {
    overflow: hidden;
    height: 180px;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(6px);
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 90;
}
.inventorySlots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 6px;
    max-width: 100%;
    overflow-x: hidden;
}
/* SLOTS */
.inventorySlots {
    display: grid;
    grid-template-columns: repeat(7, 50px);
    grid-auto-rows: 50px;
    gap: 4px;
    justify-content: center;
    padding: 6px;
    max-height: 150px;
    overflow-y: auto;
    overflow-x: hidden;
}
.count {
    position: absolute;
    bottom: 2px;
    right: 4px;
    color: white;
    font-size: 14px;
    font-weight: bold;
}
/* BUTTONS / CONTROLS */
button {
    width: 80px;
    height: 80px;
    font-size: 28px;
    border-radius: 12px;
    border: 2px solid white;
    background: rgba(255,255,255,0.15);
    color: white;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    z-index: 110;
}
#controls {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 110;
}
#leftControls {
    display: flex;
    gap: 10px;
}
/* HOTBAR TOGGLE */
#toggleHotbar {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 30px;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 16px;
    z-index: 120;
}
/* ICONS */
#soilIcon, #graniteIcon {
    width: 40px;
    height: 40px;
    display: none;
}
/* RESPONSIVE */
@media (max-width: 768px) {
    button {
        width: 60px;
        height: 60px;
        font-size: 22px;
    }
    .slot {
        width: 50px;
        height: 50px;
    }
    .inventorySlots .slot {
    width: 50px;
    height: 50px;
    }
}
</style>    </head>

function generateCrack(stage){
    const c = document.createElement("canvas");
    c.width = blockSize;
    c.height = blockSize;
    const ctx = c.getContext("2d");
    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.lineWidth = 2;
    if(stage >= 1){
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(blockSize, blockSize);
        ctx.stroke();
    }
    if(stage >= 2){
        ctx.beginPath();
        ctx.moveTo(blockSize,0);
        ctx.lineTo(0,blockSize);
        ctx.stroke();
    }
    if(stage >= 3){
        ctx.beginPath();
        ctx.moveTo(blockSize/2,0);
        ctx.lineTo(blockSize/2,blockSize);
        ctx.stroke();
    }
    if(stage >= 4){
        ctx.beginPath();
        ctx.moveTo(0,blockSize/2);
        ctx.lineTo(blockSize,blockSize/2);
        ctx.stroke();
    }
    return c;
}

    for (let y = 0; y < worldHeight; y++) {
        world[y] = [];

            world[y][x] = 0;

        height += Math.floor((Math.random() - 0.5) * 3);
        height = Math.max(45, Math.min(60, height));
        for (let y = height; y < worldHeight; y++) {
            const depth = y / worldHeight;
            const r = Math.random();
            if (depth > 0.75) {
    if (r < 0.03) world[y][x] = 5;

    else if (r < 0.15) world[y][x] = 9;
    else world[y][x] = (Math.random() < 1/25) ? 13 : 1;
}
else if (depth > 0.55) {
    if (r < 0.04) world[y][x] = 9;
    else if (r < 0.08) world[y][x] = 2;
    else world[y][x] = (Math.random() < 1/25) ? 13 : 1;
} else if (depth > 0.4) {
                if (r < 0.05) world[y][x] = 2;
                else world[y][x] = (Math.random() < 1/25) ? 13 : 1;

                else world[y][x] = (Math.random() < 1/25) ? 13 : 1;
            }
            background[y][x] = 3;
        }
        if (x !== centerX && Math.random() < 0.25) {
            const gy = height - 1;
            if (gy >= 0 && world[gy][x] === 0) {
                world[gy][x] = 4;
            }
        }
    }
    for (let x = 0; x < worldWidth; x++) {
        world[worldHeight - 1][x] = 8;
        world[worldHeight - 2][x] = 8;
    }
    for (let y = 0; y < worldHeight; y++) {
        if (world[y][centerX] !== 0 && BLOCKS[world[y][centerX]]?.solid) {
            spawnY = (y - 1) * blockSize;
            break;
        }
    }
    if (spawnY === 0) spawnY = centerY * blockSize;
    window.spawnY = spawnY;

function getSeedResult(a, b){
    const combo = [a, b].sort().join("+");
    if(combo === "cave_bg_seed+soil_seed") return "grass_seed";
    if(combo === "lava_seed+soil_seed") return "wood_seed";
    if(combo === "obsidian_seed+soil_seed") return "black_brick_seed";
    return null;
}
function hasSolidNeighbor(x, y){
    const neighbors = [
        world[y+1]?.[x],
        world[y-1]?.[x],
        world[y]?.[x+1],
        world[y]?.[x-1]
    ];
    return neighbors.some(n => BLOCKS[n]?.solid);
}

/* COLLISION */
function isSolid(x, y){
    if(x < 0 || y < 0 || x >= worldWidth || y >= worldHeight) return false;
    const id = world[y][x];
    return BLOCKS[id]?.solid || false;
}
function collide() {
    player.onGround = false;
    player.x += player.velX;
    let l = Math.floor(player.x / blockSize);
    let r = Math.floor((player.x + player.width - 0.001) / blockSize);
    let t = Math.floor(player.y / blockSize);
    let b = Math.floor((player.y + player.height - 0.001) / blockSize);
    if (player.velX > 0 && (isSolid(r, t) || isSolid(r, b))) {
        player.x = r * blockSize - player.width - 0.001;
        player.velX = 0;
    }
    if (player.velX < 0 && (isSolid(l, t) || isSolid(l, b))) {
        player.x = (l + 1) * blockSize + 0.001;
        player.velX = 0;
    }
    player.y += player.velY;
    l = Math.floor(player.x / blockSize);
    r = Math.floor((player.x + player.width - 0.001) / blockSize);
    t = Math.floor(player.y / blockSize);
    b = Math.floor((player.y + player.height - 0.001) / blockSize);
    if (player.velY > 0 && (isSolid(l, b) || isSolid(r, b))) {
        player.y = b * blockSize - player.height;
        player.velY = 0;
        player.onGround = true;
    }
    if (player.velY < 0 && (isSolid(l, t) || isSolid(r, t))) {
        player.y = (t + 1) * blockSize;
        player.velY = 0;
    }
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > worldPixelWidth) player.x = worldPixelWidth - player.width;
    if (player.y + player.height > worldPixelHeight) {
        player.y = worldPixelHeight - player.height;
        player.velY = 0;
        player.onGround = true;
    }
}
function isInWater(){
    const l = Math.floor(player.x / blockSize);
    const r = Math.floor((player.x + player.width) / blockSize);
    const t = Math.floor(player.y / blockSize);
    const b = Math.floor((player.y + player.height) / blockSize);
    for(let y = t; y <= b; y++){
        for(let x = l; x <= r; x++){
            if(world[y]?.[x] === 12){
                return true;
            }
        }
    }
    return false;
}
function checkLavaCollision() {
    const playerCenterX = player.x + player.width / 2;
    const playerCenterY = player.y + player.height / 2;
    const playerL = Math.floor(player.x / blockSize);
    const playerR = Math.floor((player.x + player.width - 0.001) / blockSize);
    const playerT = Math.floor(player.y / blockSize);
    const playerB = Math.floor((player.y + player.height - 0.001) / blockSize);
    let touched = false;
    for (let y = playerT; y <= playerB; y++) {
        for (let x = playerL; x <= playerR; x++) {
            if (world[y]?.[x] === 5) {
                const lava = BLOCKS[5];
                touched = true;
                const lavaCenterX = x * blockSize + blockSize / 2;
                const lavaCenterY = y * blockSize + blockSize / 2;
                const dx = playerCenterX - lavaCenterX;
                const dy = playerCenterY - lavaCenterY;
                if (Math.abs(dx) > Math.abs(dy)) {
                    const dir = dx > 0 ? 1 : -1;
                    player.velX = dir * 6;
                    player.velY = -2;
                    player.x += dir * blockSize * 0.6;
                } else {
                    const dir = dy > 0 ? 1 : -1;
                    player.velY = dir * 6;
                    player.velX *= 0.5;
                    player.y += dir * blockSize * 0.6;
                }
                player.onGround = false;
                playerHealth -= lava.touchDamage;
            }
        }
    }
    if (touched && playerHealth <= 0) {
        respawnPlayer();
    }
}
/* MOVEMENT (SMOOTH) */
function updateMovement() {
    if (keys.left) player.velX -= accel;
    if (keys.right) player.velX += accel;
    player.velX = Math.max(-maxSpeed, Math.min(maxSpeed, player.velX));
    if (!keys.left && !keys.right) {
        player.velX *= friction;
        if (Math.abs(player.velX) < 0.05) player.velX = 0;
    }
    if (keys.up && player.onGround && !jumpLock) {
        player.velY = -8.58;
        player.onGround = false;
        jumpLock = true;
    }
    if (!keys.up) {
        jumpLock = false;
    }
    if(isInWater()){
    player.velY += gravity * 0.2;
    player.velY *= 0.9;
    if(keys.up){
        player.velY = -3;
    }
} else {
    player.velY += gravity;
}
    if (player.velY > 12) player.velY = 12;
    collide();
}

        player.x-canvas.width/(2*zoom),    
        worldPixelWidth-canvas.width/zoom    
    ));    
    
    camera.y=Math.max(0,Math.min(    
        player.y-canvas.height/(2*zoom),    
        worldPixelHeight-canvas.height/zoom    
    ));    
}

function drawBlock(x, y){
    let block = world[y][x];
    let textureKey =
block === 1 ? "soil" :
block === 2 ? "granite" :
block === 3 ? "cave_bg" :
block === 4 ? "grass" :
block === 5 ? "lava" :
block === 6 ? "wood" :
block === 7 ? "obsidian" :
block === 8 ? "bedrock" :
block === 9 ? "marble" :
block === 10 ? "sand" :
block === 11 ? "sandstone" :
block === 12 ? "water" :
block === 13 ? "gem_soil" :
block === 14 ? "black_brick" :
null;
    if(block === 1){
        const above = world[y-1]?.[x];
        const hasGrass = (above === 0 || above === 3 || above === 4);
        textureKey = hasGrass ? "soil_grass" : "soil_base";
    }
    if(!blockTextures[textureKey]){
        blockTextures[textureKey] = generateBlockTexture(textureKey);
    }
    const drawX = (x * blockSize - camera.x) * zoom;
    const drawY = (y * blockSize - camera.y) * zoom;
    ctx.drawImage(
        blockTextures[textureKey],
        drawX,
        drawY,
        blockSize * zoom,
        blockSize * zoom
    );
    if(block === 5){
        for(let i=0;i<2;i++){
            ctx.fillStyle = "rgba(255,200,0,0.4)";
            ctx.beginPath();
            ctx.arc(
                drawX + (Math.sin((x+y+i+Date.now()/300)) * 10 + 16) * zoom,
                drawY + (Math.cos((x*y+i+Date.now()/400)) * 10 + 16) * zoom,
                2 * zoom,
                0,
                Math.PI*2
            );
            ctx.fill();
        }
    }
}
function drawBackground(x, y) {
    if (!background[y] || background[y][x] !== 3) return;
    const drawX = (x * blockSize - camera.x) * zoom;
    const drawY = (y * blockSize - camera.y) * zoom;
    const key = "cave_bg";
    if (!blockTextures[key]) {
        const c = document.createElement("canvas");
        c.width = blockSize;
        c.height = blockSize;
        const ctx2 = c.getContext("2d");
        const p = blockSize / 8;
        function px(x,y,w,h,color){
            ctx2.fillStyle = color;
            ctx2.fillRect(x*p, y*p, w*p, h*p);
        }
        px(0,0,8,8,"#3b2a1a");
        px(1,1,1,1,"#2a1d12");
        px(3,2,1,1,"#2a1d12");
        px(6,3,1,1,"#2a1d12");
        px(2,5,1,1,"#4a3320");
        px(5,6,1,1,"#4a3320");
        blockTextures[key] = c;
    }
    ctx.drawImage(
        blockTextures[key],
        drawX,
        drawY,
        blockSize * zoom,
        blockSize * zoom
    );
}

function drawGhostBlock() {
    if (!hotbar.block || hotbar.selected !== 1) return;
    const px = Math.floor(player.x / blockSize);
    const py = Math.floor(player.y / blockSize);
    const range = 3;
    const item = hotbar.block;
    const isSeed = item.includes("_seed");
    const isBg = item === "cave_bg";
    for (let y = py - range; y <= py + range; y++) {
        for (let x = px - range; x <= px + range; x++) {
            if (x < 0 || y < 0 || x >= worldWidth || y >= worldHeight) continue;
            const dist = Math.hypot(x - px, y - py);
            if (dist > range) continue;
            const worldCell = world[y]?.[x] ?? 0;
            const bgCell = background[y]?.[x] ?? 0;
            const existingTree = trees.find(t => t.x === x && t.y === y);
            let canPlace = false;
            if (isSeed) {
                if (existingTree) {
                    const result = getSeedResult(existingTree.type, item);
                    if (result) canPlace = true;
                }
                else {
                    const below = world[y + 1]?.[x];
                    if (
                        worldCell === 0 &&
                        below &&
                        BLOCKS[below]?.solid
                    ){
                        canPlace = true;
                    }
                }
            }
            else if (isBg) {
                if (bgCell === 0) {
                    canPlace = true;
                }
            }
            else {
                if (existingTree) continue;
                if (worldCell !== 0) continue;
                const blockLeft = x * blockSize;
                const blockRight = blockLeft + blockSize;
                const blockTop = y * blockSize;
                const blockBottom = blockTop + blockSize;
                const playerLeft = player.x;
                const playerRight = player.x + player.width;
                const playerTop = player.y;
                const playerBottom = player.y + player.height;
                const overlap =
                    playerRight > blockLeft &&
                    playerLeft < blockRight &&
                    playerBottom > blockTop &&
                    playerTop < blockBottom;
                if (overlap) continue;
                canPlace = true;
            }
            if (!canPlace) continue;
            const drawX = (x * blockSize - camera.x) * zoom;
            const drawY = (y * blockSize - camera.y) * zoom;
            const size = blockSize * zoom;
            ctx.fillStyle = "rgba(255,255,255,0.08)";
            ctx.fillRect(drawX, drawY, size, size);
            ctx.strokeStyle = isSeed ? "#00ff88" : "white";
ctx.lineWidth = 2;
ctx.setLineDash([6, 4]);
ctx.strokeRect(drawX, drawY, size, size);
ctx.setLineDash([]);
        }
    }
}
/* DRAW */
function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    const startX = Math.floor(camera.x / blockSize) - 1;
    const startY = Math.floor(camera.y / blockSize) - 1;
    const endX = Math.ceil((camera.x + canvas.width / zoom) / blockSize) + 1;
    const endY = Math.ceil((camera.y + canvas.height / zoom) / blockSize) + 1;
    for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
            if (x >= 0 && y >= 0 && x < worldWidth && y < worldHeight) {
                drawBackground(x, y);
                if (world[y][x] !== 0) drawBlock(x, y);
            }
        }
    }
    trees.forEach(tree => {
        try {
            const time = Date.now() - tree.plantedAt;
            const progress = time / tree.growTime;
            if(progress >= 1) tree.stage = 2;
            else if(progress >= 0.5) tree.stage = 1;
            else tree.stage = 0;
            drawTree(ctx, tree.x, tree.y, blockSize, tree.stage, tree.type);
        } catch(e) {
            console.error("TREE ERROR:", e);
        }
    });
    drawBreaking();
    drawDrops();
    drawSeedCombineHint();
    drawGhostBlock();
    drawPlayer();
    drawUIOverlay();
}
function drawUIOverlay(){
    const duration = 2000;
    const now = Date.now();
    const diff = now - inventoryFullMessageTime;
    if(diff < duration){
        const alpha = 1 - (diff / duration);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "red";
        ctx.font = "bold 28px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(
            "Inventory is full!",
            canvas.width / 2,
            20
        );
        ctx.restore();
    }
}
function drawTree(ctx, x, y, size, stage, type) {
    ctx.save();
    const drawX = Math.floor((x * size - camera.x) * zoom);
    const drawY = Math.floor((y * size - camera.y) * zoom);
    const p = Math.floor(size * zoom / 8);
    function px(xp, yp, w, h, color){
        ctx.fillStyle = color;
        ctx.fillRect(drawX + xp*p, drawY + yp*p, w*p, h*p);
    }
    if(stage === 0){
        px(3,6,1,1,"#2ecc71");
        px(3,7,1,1,"#145a32");
    }
    else if(stage === 1){
        px(2,3,4,2,"#2ecc71");
        px(1,4,6,1,"#27ae60");
        px(3,5,2,2,"#8B5A2B");
        px(3,6,1,1,"#6e3f1a");
    }
    else if(stage === 2){
        px(2,0,4,1,"#2ecc71");
        px(1,1,6,1,"#27ae60");
        px(0,2,8,2,"#2ecc71");
        px(1,4,6,1,"#27ae60");
        px(2,5,4,1,"#3CBA54");
        px(1,1,1,1,"#6CFF3C");
        px(2,0,1,1,"#6CFF3C");
        px(6,3,1,1,"#145a32");
        px(5,4,1,1,"#145a32");
        px(4,5,1,1,"#145a32");
        px(3,5,2,3,"#8B5A2B");
        px(3,6,1,2,"#6e3f1a");
        const iconSize = p * 4;
        const iconX = drawX + 2*p;
        const iconY = drawY + 2*p;
        drawTreeTypeIcon(ctx, iconX, iconY, iconSize, type);
    }
    ctx.restore();
}

    const p = size / 8;
    function px(xp, yp, w, h, color){
        ctx.fillStyle = color;
        ctx.fillRect(x + xp*p, y + yp*p, w*p, h*p);
    }
    function border(){
        px(0,0,8,1,"#FFD700");
        px(0,7,8,1,"#FFD700");
        px(0,0,1,8,"#FFD700");
        px(7,0,1,8,"#FFD700");
    }
    px(1,1,6,6,"rgba(0,0,0,0.25)");
    if(type === "soil_seed"){

    }
    else if(type === "granite_seed"){
        px(1,1,6,6,"#888");
        px(3,3,1,1,"#666");
    }
    else if(type === "cave_bg_seed"){
        px(1,1,6,6,"#3b2a1a");
        px(3,3,1,1,"#2a1d12");
    }
    else if(type === "grass_seed"){
        px(3,2,2,4,"#2ecc71");
        px(2,4,1,2,"#3CBA54");
        px(5,4,1,2,"#3CBA54");
        px(3,1,1,1,"#6CFF3C");
    }
    else if(type === "lava_seed"){
        px(1,1,6,6,"#ff4500");
        px(2,2,2,2,"#ff7a00");
        px(3,3,1,1,"#ffff66");
    }
    else if(type === "wood_seed"){

}
else if(type === "obsidian_seed"){

}
else if(type === "marble_seed"){

    px(3,3,2,2,"#ffffff");
}
else if(type === "water_seed"){

    px(3,3,2,2,"#85c1e9");
}
else if(type === "sand_seed"){
    px(1,1,6,6,"#f7e7b4");
    px(3,3,2,2,"#fff2cc");
}
else if(type === "sandstone_seed"){
    px(1,1,6,6,"#d2b48c");
    px(3,3,2,2,"#e0c9a6");
}
else if(type === "gem_soil_seed"){
    px(1,1,6,6,"#7a4f2b");
    px(3,3,2,2,"#00aaff");
}
else if(type === "black_brick_seed"){
    px(1,1,6,6,"#1a1a1a");
    px(3,3,2,2,"#444");
}
    border();
    ctx.restore();
}
function drawSeedCombineHint(){
    if(!hotbar.block || !hotbar.block.includes("_seed")) return;
    const playerTileX = Math.floor(player.x / blockSize);
    const playerTileY = Math.floor(player.y / blockSize);
    trees.forEach(tree => {
        const dist = Math.hypot(tree.x - playerTileX, tree.y - playerTileY);
        if(dist > 4) return;
        const a = tree.type;
        const b = hotbar.block;
        const combo =
    (a === "soil_seed" && b === "cave_bg_seed") ||
    (a === "cave_bg_seed" && b === "soil_seed") ||
    (a === "soil_seed" && b === "lava_seed") ||
    (a === "lava_seed" && b === "soil_seed") ||
    (a === "soil_seed" && b === "obsidian_seed") ||
    (a === "obsidian_seed" && b === "soil_seed");
        if(!combo) return;
        const drawX = Math.floor((tree.x * blockSize - camera.x) * zoom);
        const drawY = Math.floor((tree.y * blockSize - camera.y) * zoom);
        ctx.fillStyle = "#FFD700";
        ctx.font = `${16 * zoom}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(
            "+",
            drawX + (blockSize * zoom) / 2,
            drawY + (blockSize * zoom) / 2
        );
    });
}
function drawBreaking(){
    if(!breaking) return;
    const {x, y, progress} = breaking;
    let block = world[y]?.[x];
    let tree = trees.find(t => t.x === x && t.y === y);
    if(!block && !tree){
        block = background[y]?.[x];
    }
    if(!block && !tree) return;
    const hitsNeeded = tree ? 3 : BLOCKS[block]?.hits;
    if(!hitsNeeded) return;
    let stage = Math.floor((progress / hitsNeeded) * (crackImages.length - 1));
    stage = Math.max(0, Math.min(crackImages.length - 1, stage));
    const drawX = (x*blockSize - camera.x) * zoom;
    const drawY = (y*blockSize - camera.y) * zoom;
    const img = crackImages[stage];
    if(!img) return;
    ctx.drawImage(
        img,
        drawX,
        drawY,
        blockSize * zoom,
        blockSize * zoom
    );
}
/* GAME LOOP */
function update() {
    updateMovement();
    checkLavaCollision()
    resizeCanvas();
    updateCamera();
    updateBreaking();
    updateDrops();
    if(player.velY < 0) player.onGround = false;
}
function loop(){    
    update();    
    draw();    
    requestAnimationFrame(loop);    
}

/* UI DRAG SYSTEM */
document.addEventListener("touchstart", (e) => {
    if(e.target.tagName === "BUTTON") return;
    startY = e.touches[0].clientY;
    isDraggingUI = true;
});
document.addEventListener("touchmove", (e) => {
    if(e.target.closest("#inventoryUI")) return;
    if(!isDraggingUI) return;
    const currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    let newOffset = currentOffset - diff;
    newOffset = Math.max(0, Math.min(220, newOffset));
    ui.style.transform = `translateY(${newOffset}px)`;
});
document.addEventListener("touchend", (e) => {
    if(!isDraggingUI) return;
    isDraggingUI = false;
    const currentY = e.changedTouches[0].clientY;
    const diff = currentY - startY;
    if(diff < -40) currentOffset = 0;
    else if(diff > 40) currentOffset = 220;
    ui.style.transform = `translateY(${currentOffset}px)`;
});

/* START BREAKING */
function startBreaking(mouseX, mouseY, instant = false) {
    const rect = canvas.getBoundingClientRect();
    const worldX = Math.floor(
        (mouseX - rect.left) / zoom / blockSize + camera.x / blockSize
    );
    const worldY = Math.floor(
        (mouseY - rect.top) / zoom / blockSize + camera.y / blockSize
    );
    const px = Math.floor(player.x / blockSize);
    const py = Math.floor(player.y / blockSize);
    if (Math.hypot(worldX - px, worldY - py) > 3) return;
    const tree = trees.find(t => t.x === worldX && t.y === worldY);
    if (tree) {
        if (tree.stage < 2) return;
        let dropType = "soil";
        if (tree.type === "granite_seed") dropType = "granite";
        else if (tree.type === "cave_bg_seed") dropType = "cave_bg";
        else if (tree.type === "grass_seed") dropType = "grass";
        else if (tree.type === "lava_seed") dropType = "lava";
        else if (tree.type === "wood_seed") dropType = "wood";
        else if (tree.type === "obsidian_seed") dropType = "obsidian";
        else if (tree.type === "marble_seed") dropType = "marble";
        else if (tree.type === "water_seed") dropType = "water";
        else if (tree.type === "sand_seed") dropType = "sand";
        else if (tree.type === "sandstone_seed") dropType = "sandstone";
        else if (tree.type === "gem_soil_seed") dropType = "gem_soil";
        else if (tree.type === "black_brick_seed") dropType = "black_brick";
        const dropsCount = Math.floor(Math.random() * 6) + 1;
        for (let i = 0; i < dropsCount; i++) {
            spawnDrop(worldX, worldY, dropType);
        }
        trees = trees.filter(t => t !== tree);
        if (px === worldX && py === worldY) {
            player.y -= blockSize;
            player.velY = -2;
        }
        updateInventoryUI();
        updateHotbar();
        breaking = null;
        return;
    }
    let block = world[worldY]?.[worldX];
    if (!block || block === 0) {
        block = background[worldY]?.[worldX];
    }
    if (!block || block === 0) return;
    const hitsNeeded = BLOCKS[block]?.hits || 2;
    if (!breaking) {
        breaking = {
            x: worldX,
            y: worldY,
            progress: 0,
            maxProgress: hitsNeeded,
            lastHitTime: Date.now()
        };
    } else {
        if (breaking.x === worldX && breaking.y === worldY) {
            if (instant) {
                breaking.progress++;
                breaking.lastHitTime = Date.now();
            }
        } 
        else {
            breaking = {
                x: worldX,
                y: worldY,
                progress: 0,
                maxProgress: hitsNeeded,
                lastHitTime: Date.now()
            };
        }
    }
}

function drawLavaBlock(x, y) {
    const drawX = (x * blockSize - camera.x) * zoom;
    const drawY = (y * blockSize - camera.y) * zoom;
    const gradient = ctx.createLinearGradient(drawX, drawY, drawX, drawY + blockSize * zoom);
    gradient.addColorStop(0, "#ff4500");
    gradient.addColorStop(0.5, "#ff6347");
    gradient.addColorStop(1, "#b22222");
    ctx.fillStyle = gradient;
    ctx.fillRect(drawX, drawY, blockSize * zoom, blockSize * zoom);
    const flameCount = 4;
    for (let i = 0; i < flameCount; i++) {
        const fx = drawX + Math.random() * blockSize * zoom;
        const fy = drawY + Math.random() * blockSize * zoom * 0.5;
        const fw = 4 + Math.random() * 4;
        const fh = 4 + Math.random() * 8;
        ctx.fillStyle = "rgba(255, 140, 0," + (0.5 + Math.random() * 0.5) + ")";
        ctx.fillRect(fx, fy, fw, fh);
    }
}
